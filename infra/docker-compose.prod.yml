# Production overrides. Use together with docker-compose.yml:
#   docker compose --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml up -d

services:
  db:
    ports: []   # don't expose Postgres on the public internet

  kong:
    ports: []   # only reachable via Caddy on the docker network

  studio:
    ports: []   # ditto

  inbucket:
    profiles: ["disabled"]   # use a real SMTP provider in prod

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - web-dist:/srv/web:ro
    depends_on:
      - kong
      - studio

volumes:
  caddy-data:
  caddy-config:
  web-dist:
