# Production overrides for the VPS (srv844822.hstgr.cloud).
#
# Layers on top of docker-compose.yml. Differences from local dev:
#   - No host ports published; everything is routed by Traefik via hostname.
#   - Adds a `web` service that builds apps/web and serves it via nginx.
#   - Joins the external `root_default` network so the existing Traefik
#     (root-traefik-1) routes to us; nothing else on the VPS is touched.
#   - Disables the dev mail catcher; expects real SMTP via env.
#
# Bring up:
#   docker compose --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     up -d --build

networks:
  default:
    name: root_default
    external: true

services:
  # ---- internal services (no Traefik labels, no host ports) ----
  # `!reset []` forces compose to drop the host port bindings from the
  # base compose file (a plain `ports: []` MERGES with the base list and
  # leaves the bindings intact, which collides with whatever else on the
  # VPS already owns 5432, 8000, etc).
  db:
    ports: !reset []

  auth: {}
  rest: {}
  storage: {}
  meta: {}

  inbucket:
    profiles: ["disabled"]

  # ---- externally routed via Traefik ----
  kong:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.re-api.rule=Host(`${PROD_API_HOST}`)"
      - "traefik.http.routers.re-api.entrypoints=web,websecure"
      - "traefik.http.routers.re-api.tls=true"
      - "traefik.http.routers.re-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.re-api.loadbalancer.server.port=8000"

  # Note: studio's basic-auth middleware was removed because the bcrypt $
  # characters in STUDIO_BASIC_AUTH conflict with docker-compose's variable
  # interpolation, which caused Traefik to silently drop the studio router.
  # For now, gate Studio access at the network level (only access via SSH
  # tunnel) — we'll add proper auth back as a Caddy/Traefik file provider
  # config rather than a label later.
  studio:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.re-studio.rule=Host(`${PROD_STUDIO_HOST}`)"
      - "traefik.http.routers.re-studio.entrypoints=web,websecure"
      - "traefik.http.routers.re-studio.tls=true"
      - "traefik.http.routers.re-studio.tls.certresolver=mytlschallenge"
      - "traefik.http.services.re-studio.loadbalancer.server.port=3000"

  # Note: removed container_name override — compose's auto-generated name
  # (revenue-engine-web-1) works correctly with Traefik's docker provider.
  # A custom container_name can interfere with label discovery in some
  # compose+Traefik combinations.
  web:
    image: revenue-engine-web:latest
    restart: unless-stopped
    build:
      context: ../apps/web
      args:
        VITE_SUPABASE_URL: https://${PROD_API_HOST}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.re-web.rule=Host(`${PROD_WEB_HOST}`)"
      - "traefik.http.routers.re-web.entrypoints=web,websecure"
      - "traefik.http.routers.re-web.tls=true"
      - "traefik.http.routers.re-web.tls.certresolver=mytlschallenge"
      - "traefik.http.services.re-web.loadbalancer.server.port=80"
